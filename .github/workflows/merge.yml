name: Merge images to manifest

on:
  workflow_call:
    inputs:
      runs-on:
        description: Runner name i.e. default runner "ubuntu-24.04"
        type: string
        required: true
      image-name:
        description: Image name
        type: string
        required: true
      title:
        description: Custom image title (overrides repository name)
        type: string
        required: false
      description:
        description: Custom image description (overrides repository description)
        type: string
        required: false
      raw-tag:
        description: Raw tag value
        type: string
        default: latest

jobs:
  merge:
    name: Merge Images
    runs-on: ${{ inputs.runs-on }}
    if: ${{ github.actor != 'dependabot[bot]' }}
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Image name
        id: image_name
        uses: ASzc/change-string-case-action@v8
        with:
          string: ${{ inputs.image-name }}

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create Manifest
        uses: specsnl/github-actions/create-manifest@2.0.0
        with:
          image-name: ${{ steps.image_name.outputs.lowercase }}
          title: ${{ inputs.title }}
          description: ${{ inputs.description }}
          raw-tag: ${{ inputs.raw-tag }}
